<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        body,#paper{
            display:grid;
            place-content: center;
        }
        #paper{
            border:1px solid black;
        }
        .letter{
            width:190mm;
            height:242mm;
        }
        .legal{
            width:190mm;
            height: 313mm;
        }
        #size{
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="paper" class="letter">
        <div id="size" onclick="toggleSize()">
            Letter Paper<br/>
            width:190mm<br/>
            height:242mm
        </div>
    </div>
    <script>
        let letter = true

        function toggleSize(){
            if (letter){
                document.querySelector('#paper').classList.remove('letter')
                document.querySelector('#paper').classList.add('legal')
                document.querySelector('#size').innerHTML = `Legal Paper<br/>
            width:190mm<br/>
            height:313mm`
            }else{
                document.querySelector('#paper').classList.remove('legal')
                document.querySelector('#paper').classList.add('letter')
                document.querySelector('#size').innerHTML = `Letter Paper<br/>
            width:190mm<br/>
            height:242mm`
            }
            letter = !letter
        }
    </script>
</body>
</html>
